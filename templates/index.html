<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
</head>
<body>

<h2>BMI Calculator</h2>

<form method="POST">

    Weight (kg):
    <input type="number" step="0.1" name="weight" required>
    <br><br>

    Height (meters):
    <input type="number" step="0.01" name="height" required>
    <br><br>

    <button type="submit">Calculate BMI</button>

</form>

{% if result %}
<h3>{{ result }}</h3>
{% endif %}

</body>
</html>
