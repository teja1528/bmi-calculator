<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(to right,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:500px;
            border-radius:20px;
            box-shadow:0px 10px 25px rgba(0,0,0,.2);
        }

        .title{
            text-align:center;
            font-weight:bold;
        }

        footer{
            text-align:center;
            margin-top:20px;
            color:gray;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="card p-4">

    <h2 class="title mb-4">🏋️ BMI Calculator</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Weight (kg)</label>
            <input
                type="number"
                step="0.1"
                class="form-control"
                name="weight"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Height (meters)</label>
            <input
                type="number"
                step="0.01"
                class="form-control"
                name="height"
                required>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary btn-lg">
                Calculate BMI
            </button>
        </div>

    </form>

    {% if result %}

    <div class="alert alert-success mt-4 text-center">
        <h4>{{ result }}</h4>
    </div>

    {% endif %}

    <table class="table table-bordered mt-3">

        <thead class="table-dark">
            <tr>
                <th>BMI</th>
                <th>Category</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Below 18.5</td>
                <td>🔵 Underweight</td>
            </tr>

            <tr>
                <td>18.5 - 24.9</td>
                <td>🟢 Normal</td>
            </tr>

            <tr>
                <td>25 - 29.9</td>
                <td>🟠 Overweight</td>
            </tr>

            <tr>
                <td>30+</td>
                <td>🔴 Obese</td>
            </tr>

        </tbody>

    </table>

    <footer>

        Developed by <b>Teja</b><br>

        Hosted on Microsoft Azure ☁️

    </footer>

</div>

</body>

</html>
